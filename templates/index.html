<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Price Predictor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-dark">

    <div class="container mt-50">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card text-center shadow">
                    
                    <div class="card-header bg-white pt-4 pb-3">
                        <h1 class="font-weight-bold">Welcome to Car Price Predictor</h1>
                    </div>

                    <div class="card-body px-5 py-4">
                        <form method="POST" action="/predict" accept-charset="utf-8">
                            
                            <div class="col-10 form-group mx-auto" style="text-align: center;">
                                <label><b>Select Company:</b></label>
                                <select class="form-control" id="company" name="company" required="1" onchange="load_car_models(this.id, 'car_model')">
                                    <option value="" disabled {% if not selected_company %}selected{% endif %} hidden>Select a company</option>
                                    {% for company in companies %}
                                        <option value="{{ company }}" {% if company == selected_company %}selected{% endif %}>{{ company }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="col-10 form-group mx-auto" style="text-align: center;">
                                <label><b>Select Model:</b></label>
                                <select class="form-control" id="car_model" name="car_model" required="1">
                                    <option value="" disabled {% if not selected_model %}selected{% endif %} hidden>Select a model</option>
                                    {% set model_options = company_models[selected_company] if selected_company else [] %}
                                    {% for model in model_options %}
                                    <option value="{{ model }}" {% if model == selected_model %}selected{% endif %}>{{ model }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="col-10 form-group mx-auto" style="text-align: center;">
                                <label><b>Select Year of Purchase:</b></label>
                                <select class="form-control" id="year" name="year" required="1">
                                    <option value="" disabled {% if not selected_year %}selected{% endif %} hidden>Select year</option>
                                    {% for year in years %}
                                        <option value="{{ year }}" {% if year|string == selected_year %}selected{% endif %}>{{ year }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="col-10 form-group mx-auto" style="text-align: center;">
                                <label><b>Select Fuel Type:</b></label>
                                <select class="form-control" id="fuel_type" name="fuel_type" required="1">
                                    <option value="" disabled {% if not selected_fuel_type %}selected{% endif %} hidden>Select fuel type</option>
                                    {% for fuel in fuel_types %}
                                        <option value="{{ fuel }}" {% if fuel == selected_fuel_type %}selected{% endif %}>{{ fuel }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="col-10 form-group mx-auto" style="text-align: center;">
                                <label><b>Enter Number of Kilometers travelled:</b></label>
                                <input type="number" class="form-control" id="kilo_driven" name="kilo_driven" placeholder="Enter no. of kilometers travelled" required="1" value="{{ selected_kms_driven or '' }}">
                            </div>

                            <div class="col-10 form-group mx-auto mt-4">
                                <button type="submit" class="btn btn-primary btn-block btn-lg">Predict Price</button>
                            </div>

                            {% if prediction %}
                            <div class="col-10 form-group mx-auto mt-3">
                                <div class="alert alert-success" role="alert">
                                    {{ prediction }}
                                </div>
                            </div>
                            {% endif %}

                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
    // Create a dictionary from Flask
    const companyModels = {{ company_models | tojson }};

    function load_car_models(company_id, car_model_id) {

        const companySelect = document.getElementById(company_id);
        const modelSelect = document.getElementById(car_model_id);

        const selectedCompany = companySelect.value;

        // Clear old options
        modelSelect.innerHTML =
            '<option value="" disabled selected hidden>Select a model</option>';

        // Get models for selected company
        const models = companyModels[selectedCompany] || [];

        // Add models
        models.forEach(function(model) {
            const option = document.createElement("option");
            
            // Check if the model comes as an array like ['Ford', 'Figo']
            if (Array.isArray(model) && model.length > 1) {
                option.value = model[1]; // Use 'Figo' as the backend value
                option.text = model[1];  // Display 'Figo' as the plain text
            } else {
                option.value = model;    // Fallback if it's already a single string
                option.text = model;
            }
            
            modelSelect.appendChild(option);
        });
    }
    </script>

</body>
</html>
